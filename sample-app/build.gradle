plugins {
    id 'java-library'
    id 'application'
}

repositories {
    mavenCentral()
    maven {
        url 'https://s01.oss.sonatype.org/content/repositories/releases/'
    }
}

dependencies {
    implementation rootProject
}

application {
    mainClass = 'sample.App'
}

sourceCompatibility = 1.8
targetCompatibility = 1.8
